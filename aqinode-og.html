<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>AqiNode OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #020509;
    font-family: 'Syne', sans-serif;
  }

  .frame {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    background: #020509;
  }

  /* Grid background */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,210,200,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,210,200,0.045) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
  }
  .orb-1 {
    width: 500px; height: 500px;
    top: -180px; right: -80px;
    background: radial-gradient(circle, rgba(0,180,255,0.22) 0%, transparent 70%);
  }
  .orb-2 {
    width: 380px; height: 380px;
    bottom: -140px; left: 60px;
    background: radial-gradient(circle, rgba(0,255,200,0.15) 0%, transparent 70%);
  }
  .orb-3 {
    width: 260px; height: 260px;
    top: 160px; left: 580px;
    background: radial-gradient(circle, rgba(80,60,255,0.18) 0%, transparent 70%);
  }

  /* Circuit lines decoration */
  .circuit {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Noise overlay */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* Border frame */
  .border-frame {
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(0,210,200,0.12);
    border-radius: 4px;
    pointer-events: none;
  }
  .border-frame::before {
    content: '';
    position: absolute;
    top: -1px; left: 30px; right: 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,210,200,0.5), transparent);
  }
  .border-frame::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 30px; right: 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,210,200,0.3), transparent);
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(0,210,200,0.55);
    border-style: solid;
  }
  .corner-tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  /* Main content layout */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
  }

  /* Status badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,210,200,0.08);
    border: 1px solid rgba(0,210,200,0.22);
    border-radius: 2px;
    padding: 6px 14px;
    width: fit-content;
    margin-bottom: 32px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00d2c8;
    box-shadow: 0 0 8px #00d2c8;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .badge-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #00d2c8;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Wordmark */
  .wordmark {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 88px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: #ffffff;
    margin-bottom: 24px;
    position: relative;
  }
  .wordmark span.accent {
    background: linear-gradient(135deg, #00d2c8 0%, #0099ff 60%, #6040ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Tagline */
  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
    margin-bottom: 44px;
    font-weight: 400;
  }
  .tagline em {
    color: rgba(255,255,255,0.72);
    font-style: normal;
  }

  /* Pill tags */
  .tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    color: rgba(255,255,255,0.38);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    padding: 5px 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.lit {
    color: rgba(0,210,200,0.75);
    border-color: rgba(0,210,200,0.22);
    background: rgba(0,210,200,0.05);
  }

  /* Right side — visual element */
  .visual {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 260px;
  }

  /* Hexagon / node graphic */
  .hex-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .hex-ring svg {
    width: 100%; height: 100%;
  }

  /* Domain watermark */
  .domain {
    position: absolute;
    bottom: 38px;
    right: 80px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="noise"></div>

  <div class="border-frame"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Right visual: Node network SVG -->
  <div class="visual">
    <svg viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer ring -->
      <circle cx="130" cy="130" r="118" stroke="rgba(0,210,200,0.08)" stroke-width="1"/>
      <circle cx="130" cy="130" r="118" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="8 6"/>
      <!-- Mid ring -->
      <circle cx="130" cy="130" r="80" stroke="rgba(0,153,255,0.1)" stroke-width="1"/>
      <!-- Inner ring -->
      <circle cx="130" cy="130" r="44" stroke="rgba(0,210,200,0.15)" stroke-width="1"/>

      <!-- Node lines -->
      <line x1="130" y1="12" x2="130" y2="86" stroke="rgba(0,210,200,0.3)" stroke-width="1"/>
      <line x1="130" y1="174" x2="130" y2="248" stroke="rgba(0,210,200,0.3)" stroke-width="1"/>
      <line x1="12" y1="130" x2="86" y2="130" stroke="rgba(0,153,255,0.3)" stroke-width="1"/>
      <line x1="174" y1="130" x2="248" y2="130" stroke="rgba(0,153,255,0.3)" stroke-width="1"/>
      <!-- Diagonal lines -->
      <line x1="47" y1="47" x2="99" y2="99" stroke="rgba(96,64,255,0.25)" stroke-width="1"/>
      <line x1="161" y1="161" x2="213" y2="213" stroke="rgba(96,64,255,0.25)" stroke-width="1"/>
      <line x1="213" y1="47" x2="161" y2="99" stroke="rgba(0,153,255,0.2)" stroke-width="1"/>
      <line x1="47" y1="213" x2="99" y2="161" stroke="rgba(0,153,255,0.2)" stroke-width="1"/>

      <!-- Outer nodes -->
      <circle cx="130" cy="12" r="5" fill="#00d2c8" fill-opacity="0.7"/>
      <circle cx="130" cy="248" r="5" fill="#00d2c8" fill-opacity="0.5"/>
      <circle cx="12" cy="130" r="5" fill="#0099ff" fill-opacity="0.6"/>
      <circle cx="248" cy="130" r="5" fill="#0099ff" fill-opacity="0.7"/>
      <circle cx="47" cy="47" r="4" fill="#6040ff" fill-opacity="0.6"/>
      <circle cx="213" cy="213" r="4" fill="#6040ff" fill-opacity="0.5"/>
      <circle cx="213" cy="47" r="4" fill="#0099ff" fill-opacity="0.5"/>
      <circle cx="47" cy="213" r="4" fill="#0099ff" fill-opacity="0.4"/>

      <!-- Mid nodes (on 80r circle) -->
      <circle cx="130" cy="50" r="4" fill="rgba(0,210,200,0.5)"/>
      <circle cx="130" cy="210" r="4" fill="rgba(0,210,200,0.4)"/>
      <circle cx="50" cy="130" r="4" fill="rgba(0,153,255,0.5)"/>
      <circle cx="210" cy="130" r="4" fill="rgba(0,153,255,0.5)"/>
      <circle cx="73" cy="73" r="3" fill="rgba(96,64,255,0.55)"/>
      <circle cx="187" cy="187" r="3" fill="rgba(96,64,255,0.45)"/>
      <circle cx="187" cy="73" r="3" fill="rgba(0,153,255,0.45)"/>
      <circle cx="73" cy="187" r="3" fill="rgba(0,153,255,0.4)"/>

      <!-- Center node — core -->
      <circle cx="130" cy="130" r="28" fill="url(#coreGrad)" opacity="0.9"/>
      <circle cx="130" cy="130" r="28" stroke="rgba(0,210,200,0.4)" stroke-width="1.5"/>
      <circle cx="130" cy="130" r="14" fill="url(#innerCore)"/>
      <circle cx="130" cy="130" r="6" fill="#ffffff" fill-opacity="0.9"/>
      <circle cx="130" cy="130" r="6" fill="url(#dotGlow)"/>

      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="260" y2="260" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#00d2c8" stop-opacity="0.6"/>
          <stop offset="50%" stop-color="#0099ff" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#6040ff" stop-opacity="0.5"/>
        </linearGradient>
        <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#0099ff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#00d2c8" stop-opacity="0.08"/>
        </radialGradient>
        <radialGradient id="innerCore" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00d2c8" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#0040ff" stop-opacity="0.2"/>
        </radialGradient>
        <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00d2c8"/>
          <stop offset="100%" stop-color="#0099ff"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Status: Active &amp; Building</span>
    </div>

    <div class="wordmark">
      Aqi<span class="accent">Node</span>
    </div>

    <div class="tagline">
      Building Now. &nbsp;<em>Shaping What's Next.</em>
    </div>

    <div class="tags">
      <span class="tag lit">AI &amp; Agents</span>
      <span class="tag lit">Web &amp; Mobile</span>
      <span class="tag">SaaS Platforms</span>
      <span class="tag">Automation</span>
      <span class="tag">Cloud</span>
    </div>
  </div>

  <div class="domain">aqinode.click</div>
</div>
</body>
</html>
